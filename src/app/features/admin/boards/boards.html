<p-toast />
<div class="animate-fade-in flex flex-col gap-8 pb-24">
  <div class="lg:col-span-9">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-4">
      <div>
        <h1 class="text-3xl font-black text-slate-900 tracking-tight">Boards Management</h1>
      </div>
      <div class="flex items-center gap-3 w-full md:w-auto">
        <button
          pButton
          class="h-11 px-6 rounded-xl shadow-lg shadow-indigo-100"
          (click)="openCreateDialog()"
        >
          <lucide-angular [img]="icons.Plus" class="w-4 h-4" /> Add Board
        </button>
      </div>
    </div>
    <p-card class="p-6" [style]="{ 'min-height': 'calc(100vh - 25rem)' }">
      <p-table
        #dt2
        [value]="boards()"
        dataKey="id"
        [rows]="10"
        [rowsPerPageOptions]="[10, 25, 50]"
        [loading]="loading()"
        [paginator]="true"
        [globalFilterFields]="['name', 'code', 'country', 'state']"
        [tableStyle]="{ 'min-width': '75rem' }"
      >
        <ng-template #header>
          <tr>
            <th style="width: 22%" pSortableColumn="name">Name</th>
            <th style="width: 22%" pSortableColumn="code">Code</th>
            <th style="width: 22%" pSortableColumn="country">Country</th>
            <th style="width: 22%" pSortableColumn="state">State</th>
            <th style="width: 12%">Actions</th>
          </tr>
          <tr>
            <th>
              <p-columnFilter
                type="text"
                field="name"
                placeholder="Type to search"
                ariaLabel="Filter Name"
                filterOn="input"
                [showMenu]="false"
              ></p-columnFilter>
            </th>
            <th>
              <p-columnFilter
                type="text"
                field="code"
                placeholder="Type to search"
                ariaLabel="Filter Code"
                filterOn="input"
                [showMenu]="false"
              ></p-columnFilter>
            </th>
            <th>
              <p-columnFilter
                type="text"
                field="country"
                placeholder="Type to search"
                ariaLabel="Filter Country"
                filterOn="input"
                [showMenu]="false"
              ></p-columnFilter>
            </th>
            <th>
              <p-columnFilter
                type="text"
                field="state"
                placeholder="Type to search"
                ariaLabel="Filter State"
                filterOn="input"
                [showMenu]="false"
              ></p-columnFilter>
            </th>
            <th></th>
          </tr>
        </ng-template>
        <ng-template #body let-board>
          <tr>
            <td>
              <div class="flex items-center gap-3">
                <div>
                  <p class="font-bold text-slate-800">{{ board.name }}</p>
                </div>
              </div>
            </td>
            <td>
              {{ board.code }}
            </td>
            <td>
              {{ board.country }}
            </td>
            <td>
              {{ board.state }}
            </td>
            <td class="px-6 py-4 text-right">
              <p-button
                (click)="openEditDialog(board)"
                [rounded]="true"
                [text]="true"
                severity="secondary"
              >
                <lucide-angular [img]="icons.SquarePen" class="w-4 h-4" />
              </p-button>
              <p-button 
                (click)="deleteBoard(board.id)" 
                [rounded]="true" 
                [text]="true" 
                severity="danger"
              >
                <lucide-angular [img]="icons.Trash2" class="w-4 h-4" />
              </p-button>
            </td>
          </tr>
        </ng-template>
        <ng-template #emptymessage>
          <tr>
            <td colspan="5">No boards found.</td>
          </tr>
        </ng-template>
      </p-table>
    </p-card>
  </div>
</div>

<!-- Create/Edit Board Dialog -->
<p-dialog
  [visible]="showDialog()"
  (visibleChange)="showDialog.set($event)"
  [modal]="true"
  [closable]="true"
  (onHide)="closeDialog()"
  [header]="isEditMode() ? 'Edit Board' : 'Create New Board'"
  [style]="{ width: '90%', maxWidth: '500px' }"
>
  <form (ngSubmit)="saveBoard()" class="space-y-6">
    <div class="space-y-2 mt-2">
      <label class="block text-sm font-black text-slate-700 uppercase tracking-widest"
        >Board Name</label
      >
      <input
        type="text"
        pInputText
        [(ngModel)]="formData().name"
        name="name"
        placeholder="Enter board name"
        class="w-full"
      />
    </div>

    <div class="space-y-2">
      <label class="block text-sm font-black text-slate-700 uppercase tracking-widest"
        >Board Code</label
      >
      <input
        type="text"
        pInputText
        [(ngModel)]="formData().code"
        name="code"
        placeholder="Enter board code"
        class="w-full"
      />
    </div>

    <div class="space-y-2">
      <label class="block text-sm font-black text-slate-700 uppercase tracking-widest"
        >Country</label
      >
      <input
        type="text"
        pInputText
        [(ngModel)]="formData().country"
        name="country"
        placeholder="Enter country"
        class="w-full"
      />
    </div>

    <div class="space-y-2">
      <label class="block text-sm font-black text-slate-700 uppercase tracking-widest">State</label>
      <input
        type="text"
        pInputText
        [(ngModel)]="formData().state"
        name="state"
        placeholder="Enter state"
        class="w-full"
      />
    </div>

    <div class="flex gap-3 justify-end pt-4">
      <button
        type="button"
        pButton
        label="Cancel"
        (click)="closeDialog()"
        [disabled]="formLoading()"
        class="rounded-lg"
      ></button>
      <button
        type="submit"
        pButton
        [label]="isEditMode() ? 'Update' : 'Create'"
        [loading]="formLoading()"
        [disabled]="formLoading()"
        class="rounded-lg bg-indigo-600 hover:bg-indigo-700"
      ></button>
    </div>
  </form>
</p-dialog>
