<p-toast />
<div class="animate-fade-in flex flex-col gap-8 pb-24">
  <div class="lg:col-span-9">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-4">
      <div>
        <h1 class="text-3xl font-black text-slate-900 tracking-tight">Course Management</h1>
      </div>
      <div class="flex items-center gap-3 w-full md:w-auto">
        <button
          pButton
          class="h-11 px-6 rounded-xl shadow-lg shadow-indigo-100"
          (click)="openAddCourseDialog()"
        >
          <lucide-angular [img]="icons.Plus" class="w-4 h-4" /> Add Course
        </button>
      </div>
    </div>
    <p-card class="p-6" [style]="{ 'min-height': 'calc(100vh - 25rem)' }">
      <p-table
        #dt2
        [value]="courses()"
        dataKey="id"
        [rows]="10"
        [rowsPerPageOptions]="[10, 25, 50]"
        [loading]="loading()"
        [paginator]="true"
        [globalFilterFields]="['name', 'code', 'board_id']"
        [tableStyle]="{ 'min-width': '75rem' }"
      >
        <ng-template #header>
          <tr>
            <th style="width: 25%" pSortableColumn="name">Name</th>
            <th style="width: 20%" pSortableColumn="code">Code</th>
            <th style="width: 25%" pSortableColumn="board_id">Board</th>
            <th style="width: 18%" pSortableColumn="is_active">Status</th>
            <th style="width: 12%">Actions</th>
          </tr>
          <tr>
            <th>
              <p-columnFilter
                type="text"
                field="name"
                placeholder="Type to search"
                ariaLabel="Filter Name"
                filterOn="input"
                [showMenu]="false"
              ></p-columnFilter>
            </th>
            <th>
              <p-columnFilter
                type="text"
                field="code"
                placeholder="Type to search"
                ariaLabel="Filter Code"
                filterOn="input"
                [showMenu]="false"
              ></p-columnFilter>
            </th>
            <th>
              <p-columnFilter field="board_id" matchMode="in" [showMenu]="false">
                <ng-template #filter let-value let-filter="filterCallback">
                  <p-multiSelect
                     [options]="boardOptions"
                     placeholder="Any"
                     (onChange)="filter($event.value)"
                     style="min-width: 14rem"
                     class="z-100"
                     appendTo="body"
                  >
                    <ng-template let-option #item>
                      <div class="flex items-center gap-2">
                        <span>{{ option.label }}</span>
                      </div>
                    </ng-template>
                  </p-multiSelect>
                </ng-template>
              </p-columnFilter>
            </th>
            <th>
              <p-columnFilter field="is_active" matchMode="equals" [showMenu]="false">
                <ng-template #filter let-filter="filterCallback">
                  <!-- Custom implementation mapping true=active, false=inactive could be complex for primeNG direct equals filter if value uses primitive boolean, but keeping it simple below -->
                  <p-select
                    [options]="[{label:'Active', value:true}, {label:'Inactive', value:false}]"
                    (onChange)="filter($event.value)"
                    placeholder="Select One"
                    [showClear]="true"
                    style="min-width: 12rem"
                    appendTo="body"
                  >
                    <ng-template let-option #item>
                      <p-tag [value]="option.label" [severity]="getSeverity(option.value)" />
                    </ng-template>
                  </p-select>
                </ng-template>
              </p-columnFilter>
            </th>
            <th></th>
          </tr>
        </ng-template>
        <ng-template #body let-course>
          <tr>
            <td>
              <div class="flex items-center gap-3">
                <div>
                  <p class="font-bold text-slate-800">{{ course.name }}</p>
                </div>
              </div>
            </td>
            <td class="font-bold text-slate-600">
               {{ course.code }}
            </td>
            <td class="px-6 py-4 font-medium text-slate-500">
               {{ getBoardName(course.board_id) }}
            </td>
            <td>
              @if (course.is_active) {
                <div class="flex items-center gap-1.5 text-emerald-500 font-bold text-xs">
                  <lucide-angular [img]="icons.CircleCheck" class="w-4 h-4" /> Active
                </div>
              }
              @if (!course.is_active) {
                <div class="flex items-center gap-1.5 text-red-500 font-bold text-xs">
                  <lucide-angular [img]="icons.CircleMinus" class="w-4 h-4" /> Inactive
                </div>
              }
            </td>
            <td class="px-6 py-4 text-right">
              <p-button
                (click)="openEditCourseDialog(course)"
                [rounded]="true"
                [text]="true"
                severity="secondary"
              >
                <lucide-angular [img]="icons.SquarePen" class="w-4 h-4" />
              </p-button>
              <p-button [rounded]="true" [text]="true" severity="danger">
                <lucide-angular [img]="icons.Trash2" class="w-4 h-4" />
              </p-button>
            </td>
          </tr>
        </ng-template>
        <ng-template #emptymessage>
          <tr>
            <td colspan="5">No courses found.</td>
          </tr>
        </ng-template>
      </p-table>
    </p-card>
  </div>
</div>
