<p-toast />
<div class="animate-fade-in flex flex-col gap-8 pb-24">
  <div class="lg:col-span-9">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-4">
      <div>
        <h1 class="text-3xl font-black text-slate-900 tracking-tight">Organization Management</h1>
      </div>
      <div class="flex items-center gap-3 w-full md:w-auto">
        <button
          pButton
          class="h-11 px-6 rounded-xl shadow-lg shadow-indigo-100"
          (click)="openCreateDialog()"
        >
          <lucide-angular [img]="icons.Plus" class="w-4 h-4" /> Add Organization
        </button>
      </div>
    </div>
    <p-card class="p-6" [style]="{ 'min-height': 'calc(100vh - 25rem)' }">
      <p-table
        #dt2
        [value]="orgs()"
        dataKey="id"
        [rows]="10"
        [rowsPerPageOptions]="[10, 25, 50]"
        [loading]="loading()"
        [paginator]="true"
        [globalFilterFields]="['name', 'org_type', 'tenant_code']"
        [tableStyle]="{ 'min-width': '75rem' }"
      >
        <ng-template #header>
          <tr>
            <th style="width: 25%" pSortableColumn="name">Name</th>
            <th style="width: 25%" pSortableColumn="org_type">Type</th>
            <th style="width: 25%" pSortableColumn="tenant_code">Tenant Code</th>
            <th style="width: 15%" pSortableColumn="join_mode">Join Mode</th>
            <th style="width: 10%">Actions</th>
          </tr>
          <tr>
            <th>
              <p-columnFilter
                type="text"
                field="name"
                placeholder="Type to search"
                ariaLabel="Filter Name"
                filterOn="input"
                [showMenu]="false"
              ></p-columnFilter>
            </th>
            <th>
              <p-columnFilter
                type="text"
                field="org_type"
                placeholder="Type to search"
                ariaLabel="Filter Type"
                filterOn="input"
                [showMenu]="false"
              ></p-columnFilter>
            </th>
            <th>
              <p-columnFilter
                type="text"
                field="tenant_code"
                placeholder="Type to search"
                ariaLabel="Filter Tenant Code"
                filterOn="input"
                [showMenu]="false"
              ></p-columnFilter>
            </th>
            <th>
              <p-columnFilter
                type="text"
                field="join_mode"
                placeholder="Type to search"
                ariaLabel="Filter Join Mode"
                filterOn="input"
                [showMenu]="false"
              ></p-columnFilter>
            </th>
            <th></th>
          </tr>
        </ng-template>
        <ng-template #body let-org>
          <tr>
            <td>
              <div class="flex items-center gap-3">
                <div>
                  <p class="font-bold text-slate-800">{{ org.name }}</p>
                </div>
              </div>
            </td>
            <td>
              {{ org.org_type }}
            </td>
            <td>
              {{ org.tenant_code }}
            </td>
            <td>
              {{ org.join_mode }}
            </td>
            <td class="px-6 py-4 text-right">
              <p-button [rounded]="true" [text]="true" severity="secondary">
                <lucide-angular [img]="icons.SquarePen" class="w-4 h-4" />
              </p-button>
            </td>
          </tr>
        </ng-template>
        <ng-template #emptymessage>
          <tr>
            <td colspan="5">No organizations found.</td>
          </tr>
        </ng-template>
      </p-table>
    </p-card>
  </div>
</div>

<!-- Create Organization Dialog -->
<p-dialog
  [visible]="showDialog()"
  (visibleChange)="showDialog.set($event)"
  [modal]="true"
  [closable]="true"
  (onHide)="closeDialog()"
  header="Create New Organization"
  [style]="{ width: '90%', maxWidth: '500px' }"
>
  <form (ngSubmit)="saveOrganization()" class="space-y-6">
    <div class="space-y-2 mt-2">
      <label class="block text-sm font-black text-slate-700 uppercase tracking-widest"
        >Organization Name</label
      >
      <input
        type="text"
        pInputText
        [(ngModel)]="formData().name"
        name="name"
        placeholder="Enter organization name"
        class="w-full"
      />
    </div>

    <div class="space-y-2">
      <label class="block text-sm font-black text-slate-700 uppercase tracking-widest"
        >Organization Type</label
      >
      <input
        type="text"
        pInputText
        [(ngModel)]="formData().org_type"
        name="org_type"
        placeholder="Enter organization type (e.g. school, company)"
        class="w-full"
      />
    </div>

    <div class="space-y-2">
      <label class="block text-sm font-black text-slate-700 uppercase tracking-widest"
        >Tenant Code</label
      >
      <input
        type="text"
        pInputText
        [(ngModel)]="formData().tenant_code"
        name="tenant_code"
        placeholder="Enter tenant code"
        class="w-full"
      />
    </div>

    <div class="space-y-2">
      <label class="block text-sm font-black text-slate-700 uppercase tracking-widest"
        >Admin Name</label
      >
      <input
        type="text"
        pInputText
        [(ngModel)]="formData().admin_name"
        name="admin_name"
        placeholder="Enter admin name"
        class="w-full"
      />
    </div>

    <div class="space-y-2">
      <label class="block text-sm font-black text-slate-700 uppercase tracking-widest"
        >Admin Email</label
      >
      <input
        type="email"
        pInputText
        [(ngModel)]="formData().admin_email"
        name="admin_email"
        placeholder="Enter admin email"
        class="w-full"
      />
    </div>

    <div class="flex gap-3 justify-end pt-4">
      <button
        type="button"
        pButton
        label="Cancel"
        (click)="closeDialog()"
        [disabled]="formLoading()"
        class="rounded-lg"
      ></button>
      <button
        type="submit"
        pButton
        label="Create"
        [loading]="formLoading()"
        [disabled]="formLoading()"
        class="rounded-lg bg-indigo-600 hover:bg-indigo-700"
      ></button>
    </div>
  </form>
</p-dialog>
