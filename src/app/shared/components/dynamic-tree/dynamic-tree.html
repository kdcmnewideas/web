<div class="flex flex-col md:flex-row h-full min-h-0">
  <!-- ─── Sidebar: Tree ─── -->
  <div class="w-full md:w-1/3 lg:w-[30%] flex flex-col min-h-0 max-h-[40vh] md:max-h-none">
    <div class="overflow-y-auto flex-1 py-2 px-3">
      <ul class="tree-root">
        <ng-container
          *ngTemplateOutlet="nodeList; context: { $implicit: treeItems() }"
        ></ng-container>
      </ul>
    </div>

    <p-confirmDialog />
  </div>

  <!-- ─── Content Area ─── -->
  <div class="w-full md:w-2/3 lg:w-[70%] p-4 md:p-6 overflow-y-auto">
    <ng-content></ng-content>
  </div>
</div>

<!-- Recursive node list template -->
<ng-template #nodeList let-items>
  @for (item of items; track item.id; let last = $last) {
    <li [class.last-child]="last">
      <div class="node-row group" (click)="onItemClick(item)">
        <span class="dot"></span>

        @if (item.editing) {
          <input
            class="edit-input"
            [(ngModel)]="item.label"
            [ngModelOptions]="{ standalone: true }"
            (keydown.enter)="saveEdit(item, $event)"
            (keydown.escape)="cancelEdit(item, $event)"
            (click)="$event.stopPropagation()"
          />
          <button class="action-btn save" (click)="saveEdit(item, $event)" title="Save">
            <i class="pi pi-check"></i>
          </button>
          <button class="action-btn cancel" (click)="cancelEdit(item, $event)" title="Cancel">
            <i class="pi pi-times"></i>
          </button>
        } @else {
          <span class="node-label" [class.selected]="selectedId() === item.id">
            {{ item.label }}
          </span>

          <span class="actions invisible group-hover:visible">
            <button class="action-btn" (click)="startAdd(item, $event)" title="Add child">
              <i class="pi pi-plus"></i>
            </button>
            <button class="action-btn" (click)="startEdit(item, $event)" title="Rename">
              <i class="pi pi-pencil"></i>
            </button>
            <button class="action-btn delete" (click)="confirmDelete(item, $event)" title="Delete">
              <i class="pi pi-trash"></i>
            </button>
          </span>
        }
      </div>

      @if (item.children.length && item.expanded) {
        <ul class="tree-children">
          <ng-container
            *ngTemplateOutlet="nodeList; context: { $implicit: item.children }"
          ></ng-container>
        </ul>
      }
    </li>
  }
</ng-template>
